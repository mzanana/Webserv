<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ERROR_CODE}} - WebServ Error</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --panel-bg: #161b22;
            --accent-color: #58a6ff;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --error-red: #ff7b72;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .error-container {
            text-align: center;
            background-color: var(--panel-bg);
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            border: 1px solid #21262d;
            max-width: 500px;
            width: 100%;
        }

        .error-code {
            font-size: 6rem;
            font-weight: 800;
            line-height: 1;
            color: var(--error-red);
            margin-bottom: 0.5rem;
            letter-spacing: -2px;
            text-shadow: 0 0 20px rgba(255, 123, 114, 0.15);
        }

        .error-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: var(--text-main);
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, #30363d, transparent);
            margin-bottom: 1.5rem;
        }

        .error-message {
            color: var(--text-muted);
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .server-info {
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 0.8rem;
            color: var(--accent-color);
            background-color: rgba(88, 166, 255, 0.1);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            display: inline-block;
            border: 1px solid rgba(88, 166, 255, 0.2);
        }
    </style>
</head>
<body>

    <div class="error-container">
        <div class="error-code">{{ERROR_CODE}}</div>
        
        <div class="error-title">{{ERROR_STATUS}}</div>
        
        <div class="divider"></div>
        
        <div class="error-message">
            {{ERROR_MESSAGE}}
        </div>
        
        <div class="server-info">
            Server: WebServ/1.1 (C++98 / Multiplexed I/O)
        </div>
    </div>

</body>
</html>
